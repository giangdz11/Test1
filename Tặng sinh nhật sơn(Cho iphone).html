<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Sinh Nhật Sơn</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Chặn zoom bằng thao tác chạm trên trình duyệt hiện đại */
            touch-action: manipulation;
        }

        #container {
            text-align: center;
            background: #111111;
            color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 0 25px rgba(231, 76, 60, 0.2);
            width: 320px;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #e74c3c;
            font-size: 1.5rem;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p { color: #aaaaaa; font-size: 0.95rem; }

        input {
            background: #1a1a1a;
            border: 1px solid #e74c3c;
            color: #ffffff;
            padding: 12px;
            width: 80%;
            text-align: center;
            /* Font 16px để iPhone không tự động zoom khi focus */
            font-size: 16px; 
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            -webkit-appearance: none;
        }

        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            touch-action: manipulation;
        }

        #error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 10px; }

        #gift-content { display: none; }

        .cake-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .typing-text {
            color: #00ffcc; 
            font-weight: bold;
            font-size: 1rem;
            line-height: 1.6;
            min-height: 80px;
            font-family: Arial, sans-serif; 
        }

        .footer-blink { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }

        #confetti {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            display: none;
        }
    </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div id="container">
    <div id="login-screen">
        <h1>BẢO MẬT HỆ THỐNG</h1>
        <p>Vui lòng nhập mã PIN:</p>
        <input type="text" id="pinInput" placeholder="Là sinh nhật bạn đấy" autocomplete="off" inputmode="numeric">
        <br>
        <button onclick="checkPass()">DECRYPT</button>
        <p id="error-msg"></p>
    </div>

    <div id="gift-content">
        <div id="loading-msg" style="color: #e74c3c; font-weight: bold;">[+] ĐANG GIẢI MÃ QUÀ TẶNG...</div>
        <div id="final-gift" style="display: none;">
            <img src="https://png.pngtree.com/png-clipart/20241206/original/pngtree-birthday-cake-clipart-png-image_17627567.png" alt="Bánh Sinh Nhật" class="cake-img">
            <div id="text-area" class="typing-text"></div>
            <div id="blink-area" class="footer-blink"></div>
        </div>
    </div>
</div>

<script>
    // Chặn zoom khi nhấn đúp (double tap) bằng JavaScript
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
            event.preventDefault();
        }
        lastTouchEnd = now;
    }, false);

    function checkPass() {
        const input = document.getElementById('pinInput').value.trim();
        const validPins = ["17/11/2013", "17112013", "17", "17/11/13", "17 11 2013", "171113", "17 11 13", "17-11-2013"];
        
        if (validPins.includes(input)) {
            showGift();
        } else {
            document.getElementById('error-msg').innerText = "Sai mã PIN rồi Sơn ơi!";
        }
    }

    async function showGift() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('gift-content').style.display = 'block';

        await new Promise(r => setTimeout(r, 1500));
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('final-gift').style.display = 'block';
        startConfetti();

        const lines = [
            ">>> CHÚC MỪNG SINH NHẬT SƠN <<<",
            "Tuổi mới chúc bạn luôn chăm ngoan và học giỏi nhé!",
            "--- Một món quà nhỏ từ GIANG ---"
        ];
        
        const textArea = document.getElementById('text-area');
        for(let line of lines) {
            await typeEffect(line, textArea);
            textArea.innerHTML += "<br>"; 
        }

        const blinkArea = document.getElementById('blink-area');
        setInterval(() => {
            const isRed = blinkArea.style.color === 'rgb(231, 76, 60)';
            blinkArea.innerText = isRed ? "★ HAPPY BIRTHDAY ★" : "♥ HAPPY BIRTHDAY ♥";
            blinkArea.style.color = isRed ? "#ffffff" : "#e74c3c";
        }, 500);
    }

    function typeEffect(text, element) {
        return new Promise(resolve => {
            let i = 0;
            function next() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(next, 50); 
                } else { resolve(); }
            }
            next();
        });
    }

    document.getElementById('pinInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            e.target.blur(); // Ẩn bàn phím sau khi nhấn Enter
            checkPass();
        }
    });

    function startConfetti() {
        const canvas = document.getElementById('confetti');
        canvas.style.display = 'block';
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let pieces = [];
        const colors = ['#e74c3c', '#ffffff', '#f1c40f', '#ff0000'];
        function Piece(x, y) {
            this.x = x; this.y = y;
            this.size = (Math.random() * 8) + 4;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.speed = (Math.random() * 5) + 2;
            this.angle = Math.random() * Math.PI * 2;
        }
        Piece.prototype.update = function() {
            this.y += this.speed;
            this.x += Math.cos(this.angle) * 1;
            if (this.y > canvas.height) this.y = -10;
        }
        Piece.prototype.draw = function() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
        for (let i = 0; i < 150; i++) {
            pieces.push(new Piece(Math.random() * canvas.width, Math.random() * canvas.height));
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    }
</script>
</body>
</html>
